<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Animales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Registro de Animales</h1>
        <a href="VentanaPrincipal.html">Volver al inicio</a>
    </header>

    <main>
        <form id="animalForm">
            <label>Nombre:</label>
            <input type="text" id="nombre" required>
            
            <label>Especie:</label>
            <input type="text" id="especie" required>
            
            <label>Edad:</label>
            <input type="number" id="edad" required>
            
            <label>Estado de Salud:</label>
            <input type="text" id="salud" required>

            <button type="button" onclick="registrarAnimal()">Registrar</button>
        </form>

        <h2>Animales Registrados</h2>
        <table id="tablaAnimales">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Especie</th>
                    <th>Edad</th>
                    <th>Salud</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>
</body>
<script src="script.js"></script>
</html>
